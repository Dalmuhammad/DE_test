version: "3.9"

services:

  mysql:
    image: mysql:8
    container_name: de_mysql
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: astraworld_db
      MYSQL_USER: user
      MYSQL_PASSWORD: password123

    ports:
      - "3307:3306"  # host port 3307 tetap aman

    volumes:
      - ./sql_files:/docker-entrypoint-initdb.d

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-uroot", "-prootpassword"]
      interval: 10s
      retries: 10
      timeout: 5s


  ingest:
    build: .
    container_name: de_ingest

    depends_on:
      mysql:
        condition: service_healthy  # tunggu mysql siap

    command: python pyscript/ingest_raw.py

    volumes:
      - .:/app

    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: user
      DB_PASSWORD: password123
      DB_NAME: astraworld_db


  cleaning:
    build: .
    container_name: de_cleaning

    depends_on:
      mysql:
        condition: service_healthy
      ingest:
        condition: service_started   # biar docker aware ingest start dulu

    command: bash -c "python pyscript/wait_for_ingest.py && python pyscript/cleaning_tables.py"

    volumes:
      - .:/app

    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: user
      DB_PASSWORD: password123
      DB_NAME: astraworld_db